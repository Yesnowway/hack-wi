<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HACKED WIFI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Visually hidden but accessible to screen readers */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>
<script>
    if (!sessionStorage.getItem('wifiiiss_logged_in')) {
        window.location.href = 'login.html';
    }
</script>

<div class="container">
    <h1 class="neon-title">𝐇𝐀𝐂𝐊𝐄𝐃 𝐖𝐈𝐅𝐈</h1>
    <p class="subtitle">DEVELOPER : 𝑩𝑶𝑺𝑺 𝕱</p>

    <div class="search-wrapper">
        <!-- Hidden label for search input -->
        <label for="searchInput" class="visually-hidden">Search Places</label>
        <input type="text" id="searchInput" placeholder="Search Places.." autocomplete="off">
        <div class="search-icon">🔍</div>
    </div>

    <div id="placesList" class="places-list"></div>

    <div id="locationPanel" class="location-panel">
        <h3>WIFI INFO</h3>
        <div id="locationInfo">Select Location To See Wifi Info</div>
    </div>

    <div class="feedback-panel">
        <h3>💬 YOUR MESSAGE</h3>
        <label for="feedbackMsg" class="visually-hidden">Your Message</label>
        <textarea id="feedbackMsg" rows="3" placeholder="Feedback Or Any Suggestions...."></textarea>
        <button id="sendFeedbackBtn">SEND MESSAGE</button>
        <div id="feedbackStatus"></div>
    </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
