<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HACKED WIFI</title>
    <!-- Leaflet CSS + JS (terrain ready) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<script>
    if (!sessionStorage.getItem('wifiiiss_logged_in')) {
        window.location.href = 'login.html';
    }
</script>

<div class="container">
    <h1 class="neon-title">𝐇𝐀𝐂𝐊𝐄𝐃 𝐖𝐈𝐅𝐈</h1>
    <p class="subtitle">𝙳𝙴𝚅𝙴𝙻𝙾𝙿𝙴𝚁 : 𝑩𝑶𝑺𝑺_𝕱</p>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search Places.." autocomplete="off">
        <div class="search-icon">🔍</div>
    </div>

    <div id="placesList" class="places-list"></div>

    <!-- 🗺️ TERRAIN MAP (replaces old location panel) -->
    <div class="wifi-map-container">
        <div id="wifiTerrainMap"></div>
    </div>

    <div class="feedback-panel">
        <h3>💬 YOUR MESSAGE</h3>
        <textarea id="feedbackMsg" rows="3" placeholder="Feedback Or Any Suggestions...."></textarea>
        <button id="sendFeedbackBtn">SEND MESSAGE</button>
        <div id="feedbackStatus"></div>
    </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
